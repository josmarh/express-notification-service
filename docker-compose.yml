services:
  redis:
    restart: unless-stopped
    image: redis:7-alpine
    container_name: notification_service_redis
    ports:
      - '6380:6379'
    networks:
      - notification_service_network
    volumes:
      - redis_data:/data 

  auth-service:
    restart: unless-stopped
    build: ./auth-service
    image: auth_service
    container_name: auth_service
    ports:
      - '3002:3000'
    volumes:
      - ./auth-service:/app
      - /app/node_modules # Keeps container's node_modules separate
    env_file:
      - ./auth-service/.env 
    networks:
      - notification_service_network
    depends_on:
      - notification-service
      - database

  task-service:
    restart: unless-stopped
    build: ./task-service
    image: task_service
    container_name: task_service
    ports:
      - '3001:3000'
    volumes:
      - ./task-service:/app
      - /app/node_modules # Keeps container's node_modules separate
    env_file:
      - ./task-service/.env 
    networks:
      - notification_service_network
    depends_on:
      - notification-service
      - database

  notification-service:
    restart: unless-stopped
    build: ./notification-service
    image: notification_service
    container_name: notification_service
    ports: 
      - '3000:3000'
    volumes:
      - ./notification-service:/app
      - /app/node_modules # Keeps container's node_modules separate
    env_file:
      - ./notification-service/.env 
    networks:
      - notification_service_network
    depends_on:
      - redis

  worker:
    restart: unless-stopped
    image: notification_service
    container_name: notification_service_worker
    command: npm run worker
    volumes:
      - ./notification-service:/app
      - /app/node_modules
    env_file:
      - ./notification-service/.env 
    networks:
      - notification_service_network
    depends_on:
      - redis
      - notification-service

  database:
    restart: unless-stopped
    image: postgres:15-alpine
    container_name: notification_service_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: notification_service_db
    ports:
      - '5433:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - notification_service_network

networks:
  notification_service_network:
    driver: bridge

volumes:
  redis_data:
  db_data: